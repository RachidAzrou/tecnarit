<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YOUR LUCK STARTS WITH OUR IT SERVICES</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-image: url('achtergrond.jpg'); /* Replace 'background-image.jpg' with the path to your background image */
            background-size: cover;
            background-position: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }
        .logo {
            width: 300px; /* Adjust the width of the logo as desired */
            height: auto; /* Maintain aspect ratio */
            margin-top: 50px; /* Adjust the margin-top to center the logo vertically */
        }
        .container {
            text-align: center;
            color: #fff; /* Text color for contrast */
            padding: 20px;
            background-color: rgba(0, 0, 0, 0.7); /* Semi-transparent black background */
            border-radius: 10px;
        }
        h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }
        p {
            font-size: 1.2em;
            margin: 0 0 20px;
        }
        a {
            color: #00c0ef;
            text-decoration: none;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="logo.png" alt="Company Logo" class="logo"> <!-- Replace 'logo.png' with the path to your logo image -->
        <p>Thank you for visiting our website!</p>
        <p>If you need assistance, <a href="#">contact us</a>.</p>
    </div>
</body>
</html>

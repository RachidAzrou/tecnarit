<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Need a Ride?</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-image: url('abstracte-achtergrond-met-verbindende-punten-en-lijnen.jpg'); /* Check if the filename and extension match exactly */
            background-size: cover;
            background-position: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            color: #fff; /* Text color for contrast */
        }
        .container {
            text-align: center;
            padding: 20px;
            background-color: rgba(0, 0, 0, 0.7); /* Semi-transparent black background */
            border-radius: 10px;
            max-width: 80%; /* Limit the width of the container */
            width: 100%;
            box-sizing: border-box;
        }
        .header {
            font-size: 3.5em; /* Increase font size for the header */
            margin-bottom: 20px; /* Adjust the margin-bottom to create space between header and logo */
        }
        .logo {
            width: 80%; /* Logo will be 80% of the container width */
            height: auto; /* Maintain aspect ratio */
            max-width: 600px; /* Maximum width for the logo */
            margin-bottom: 20px; /* Adjust the margin-bottom to create space between logo and text */
        }
        .redirect {
            font-size: 1.2em; /* Adjust font size for the redirection message */
            margin: 10px 0; /* Adjust margin for spacing */
        }
        a {
            color: #00c0ef;
            text-decoration: none;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="header">No rides here, but we can elevate your IT!</h1>
        <img src="logo.png" alt="Company Logo" class="logo">
        <p class="redirect">You will be redirected to our main website shortly.</p>
        <p class="redirect">If you're not redirected, <a href="https://www.jouw-website.com">click here</a> to go to our website.</p>
    </div>
</body>
</html>
